<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Booking Confirmed | TravelIndia</title>
    <meta name="description" content="Your booking is successfully confirmed. Check your booking ID and trip details.">
    <meta name="keywords" content="booking confirmed, trip status, ticket voucher">
    <link rel="canonical" href="https://travelindia-demo.com/confirmation.html">
    <meta name="robots" content="noindex, nofollow">
    
    <meta property="og:title" content="Booking Confirmed | TravelIndia">
    <meta property="og:description" content="Your booking is successfully confirmed. Check your booking ID and trip details.">
    <meta property="og:url" content="https://travelindia-demo.com/confirmation.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="TravelIndia">
    <meta property="og:locale" content="en_IN">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Booking Confirmed | TravelIndia">
    <meta name="twitter:description" content="Your booking is successfully confirmed. Check your booking ID and trip details.">
    
    <meta name="theme-color" content="#2563eb">
    <meta name="author" content="TravelIndia Team">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="background:var(--light);">
    <header>
        <div class="container top-menu">
            <a href="index.html" class="logo"><i class="fa-solid fa-plane-departure"></i> TravelIndia</a>
            <nav class="menu-links"><a href="index.html">Back to Home</a></nav>
        </div>
    </header>

    <main>
        <div class="container section">
            <div class="confirmation-item-box">
                <i class="fa-solid fa-circle-check success-icon"></i>
                <h1 style="color:var(--dark);">Booking Confirmed!</h1>
                <p style="font-size:1.1rem; color:var(--gray); margin-top:1rem;">Thank you for your booking. Your ticket/voucher will be sent to your email.</p>
                
                <div style="background:#f8fafc; border:1px dashed var(--border); padding:2rem; border-radius:8px; margin:2rem 0; text-align:center;">
                    <p style="margin-bottom:0.5rem; text-transform:uppercase; font-size:0.9rem; font-weight:bold; color:var(--gray);">Your Reservation Number</p>
                    <h2 id="bkg-id" style="font-size:2.5rem; color:var(--primary); margin:0;">BKG-XXXXXX</h2>
                </div>

                <!-- Booking Details Summary (Populated by JS) -->
                <div id="booking-details-summary"></div>

                <div style="margin-top:2rem; text-align:center;">
                    <a href="javascript:window.print()" style="color:var(--primary); text-decoration:none; font-weight:600;"><i class="fa-solid fa-download"></i> Download E-Ticket / Receipt</a>
                </div>

                <p style="margin-top:2rem;">Need to make changes or have questions?</p>
                <div style="margin-top:1.5rem;">
                    <a href="index.html" class="button button-border" style="margin-right:1rem;">Back to Home</a>
                    <a href="contact.html" class="button button-blue">Contact Support</a>
                </div>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
