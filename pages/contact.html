<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description"
        content="Reach out to TravelIndia customer care for booking queries, cancellations, or partnership opportunities.">
    <meta name="keywords"
        content="contact travelindia, travel support, hotel booking customer care, bus cancellation help">
    <link rel="canonical" href="https://travelindia-demo.com/contact.html">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">

    <meta property="og:title" content="Contact Us - Support Team | TravelIndia">
    <meta property="og:description"
        content="Reach out to TravelIndia customer care for booking queries, cancellations, or partnership opportunities.">
    <meta property="og:url" content="https://travelindia-demo.com/contact.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="TravelIndia">
    <meta property="og:locale" content="en_IN">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Contact Us - Support Team | TravelIndia">
    <meta name="twitter:description"
        content="Reach out to TravelIndia customer care for booking queries, cancellations, or partnership opportunities.">

    <meta name="theme-color" content="#2563eb">
    <meta name="author" content="TravelIndia Team">
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <!-- Main Wrapper -->
    <!-- Header -->
    <header>
        <div class="container top-menu">
            <a href="../index.html" class="logo"><i class="fa-solid fa-plane-departure"></i> TravelIndia</a>
            <button class="mobile-icon" aria-label="Toggle Navigation Menu"><i class="fa-solid fa-bars"></i></button>
            <!-- Navigation -->
            <nav class="menu-links">
                <a href="../index.html">Home</a>
                <a href="../destinations/destinations.html">Destinations</a>
                <a href="../hotels/hotels.html">Hotels</a>
                <a href="../transport/transport.html">Transport</a>
                <a href="about.html">About Us</a>
                <a href="contact.html">Contact</a>
            </nav>
        </div>
    </header>

    <!-- Page Content -->
    <main>
        <div class="container section">
            <h1 class="align-center">Contact Our Support</h1>
            <p class="align-center mb-4">We're here to help you 24x7</p>

            <div class="checkout-page-layout">
                <div id="contactAlert" style="display:none; margin-bottom:1rem; padding:1rem; border-radius:8px; font-weight:bold; text-align:center;"></div>
                <form id="contactForm" class="booking-summary">
                    <div class="input-group mb-4">
                        <label>Name</label>
                        <input type="text" id="contactName" class="input-box" required>
                    </div>
                    <div class="input-group mb-4">
                        <label>Email</label>
                        <input type="email" id="contactEmail" class="input-box" required>
                    </div>
                    <div class="input-group mb-4">
                        <label>Message</label>
                        <textarea id="contactMessage" class="input-box" rows="5" required></textarea>
                    </div>
                    <button type="submit" id="contactBtn" class="button button-blue" style="margin-top: 1rem;">Send Message</button>
                </form>
                <div>
                    <h3>Our Office</h3>
                    <p>Near Income Tax, Ashram Road, Ahmedabad, Gujarat, India</p>
                    <p>Phone: +91 8200569473</p>
                    <div style="margin-top: 2rem; border-radius: var(--border-radius); overflow:hidden;">
                        <iframe
                            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3671.740263300557!2d72.5694721!3d23.033282!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x395e84f501b80c1d%3A0xc3fecb2b73bc7013!2sIncome%20Tax%20Cross%20Road!5e0!3m2!1sen!2sin!4v1680000000000!5m2!1sen!2sin"
                            width="100%" height="300" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="../js/main.js" defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const contactForm = document.getElementById('contactForm');
            if(contactForm) {
                contactForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const btn = document.getElementById('contactBtn');
                    const alertBox = document.getElementById('contactAlert');
                    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sending...';
                    btn.disabled = true;
                    
                    try {
                        const res = await fetch('/api/contact', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                name: document.getElementById('contactName').value,
                                email: document.getElementById('contactEmail').value,
                                message: document.getElementById('contactMessage').value
                            })
                        });
                        const data = await res.json();
                        
                        alertBox.style.display = 'block';
                        if(res.ok) {
                            alertBox.style.background = '#dcfce7';
                            alertBox.style.color = '#15803d';
                            alertBox.innerText = data.message;
                            contactForm.reset();
                        } else {
                            alertBox.style.background = '#fee2e2';
                            alertBox.style.color = '#b91c1c';
                            alertBox.innerText = data.error || "Failed to send message.";
                        }
                    } catch(err) {
                        alertBox.style.display = 'block';
                        alertBox.style.background = '#fee2e2';
                        alertBox.style.color = '#b91c1c';
                        alertBox.innerText = "Network error. Try again.";
                    } finally {
                        btn.innerHTML = 'Send Message';
                        btn.disabled = false;
                    }
                });
            }
        });
    </script>
</body>

</html>
