<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | TravelIndia</title>
    <meta name="description"
        content="Create a new TravelIndia account today and get exclusive discounts on your first hotel and bus bookings.">
    <meta name="keywords" content="travelindia sign up, create account, register, travel discounts">
    <link rel="canonical" href="https://travelindia-demo.com/signup.html">
    <meta name="robots" content="noindex, nofollow">

    <meta property="og:title" content="Sign Up | TravelIndia">
    <meta property="og:description"
        content="Create a new TravelIndia account today and get exclusive discounts on your first hotel and bus bookings.">
    <meta property="og:url" content="https://travelindia-demo.com/signup.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="TravelIndia">
    <meta property="og:locale" content="en_IN">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Sign Up | TravelIndia">
    <meta name="twitter:description"
        content="Create a new TravelIndia account today and get exclusive discounts on your first hotel and bus bookings.">

    <meta name="theme-color" content="#2563eb">
    <meta name="author" content="TravelIndia Team">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body style="background: var(--light); height:100vh; display:flex; flex-direction:column; justify-content:center;">
    <div class="container align-center mb-4">
        <a href="index.html" class="logo" style="justify-content:center; font-size:2rem;"><i
                class="fa-solid fa-plane-departure"></i> TravelIndia</a>
    </div>
    <div class="login-box mt-0">
        <h2>Create an Account</h2>
        <form id="signupForm">
            <div class="input-group mb-4">
                <label>Full Name</label>
                <input type="text" id="name" class="input-box" required>
            </div>
            <div class="input-group mb-4">
                <label>Email Address</label>
                <input type="email" id="email" class="input-box" required>
            </div>
            <div class="input-group mb-4">
                <label>Password</label>
                <input type="password" id="password" class="input-box" required>
            </div>
            <button type="submit" class="button button-blue button-full">Sign Up</button>
        </form>
        <p class="align-center" style="margin-top:1.5rem;">Already have an account? <a href="login.html"
                style="color:var(--primary); font-weight:600;">Log in</a></p>
    </div>
    <script src="js/main.js"></script>
</body>

</html>
